<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập Sinh viên - PTIT</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Học viện Công nghệ Bưu chính Viễn thông</h1>
    </header>

    <main class="main-content">
      <div class="auth-container">
        <div class="auth-header">
          <h2>Đăng nhập</h2>
          <p>với tư cách sinh viên</p>
        </div>
        <form class="auth-form" id="student-login-form">
          <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              placeholder="Nhập tên đăng nhập"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>
          <button type="submit" class="btn-submit">Đăng Nhập</button>
          <div class="auth-links">
            <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            <p>Hoặc</p>
            <p style="margin-top: 10px">
              Là cán bộ/giảng viên?
              <a href="admin_login.html">Đăng nhập Quản trị</a>
            </p>
          </div>
        </form>
      </div>
    </main>

    <footer class="app-footer">
      <p>
        &copy; 2026 Học viện Công nghệ Bưu chính Viễn thông. Dành cho mục đích
        học tập.
      </p>
    </footer>

    <script src="auth.js"></script>
  </body>
</html>
