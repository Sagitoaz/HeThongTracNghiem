<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <header>
      <div>Học viện công nghệ bưu chính viễn thông</div>
      <div>Hệ thống thi trắc nghiệm trực tuyến</div>
    </header>

    <main>
      <!-- Login form -->
      <div>
        <h2>Đăng nhập</h2>
        <p>Nhập thông tin tài khoản sinh viên để tiếp tục.</p>

        <!-- Success banner (after register) -->
        <div id="successBanner" style="display: none">
          ✅ Đăng ký thành công! Vui lòng đăng nhập.
        </div>

        <!-- Error banner -->
        <div id="errorBanner" style="display: none; color: red"></div>

        <form id="loginForm" novalidate>
          <div>
            <label for="username">Tên đăng nhập</label>
            <input
              id="username"
              type="text"
              name="username"
              placeholder="Nhập tên đăng nhập"
              autocomplete="username"
              autofocus
            />
            <p id="usernameError" style="color: red"></p>
          </div>

          <div>
            <label for="password">Mật khẩu</label>
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
            />
            <button type="button" id="togglePw">👁</button>
          </div>
          <div>
            <button type="button" id="loginBtn">Đăng nhập</button>
          </div>
        </form>
        <div>
          <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
        </div>
        <div>
          <p>hoặc</p>
        </div>
        <div>
          <p>
            Bạn là quản trị viên?
            <a href="admin_login.html">Đăng nhập tại đây</a>
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
