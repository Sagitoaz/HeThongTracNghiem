<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PTIT Admin - Dashboard</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="brand">
          <span class="badge">Admin</span>
        </div>
        <nav>
          <a class="active" href="./admin-dashboard.html">Dashboard</a>
          <a href="./exam-editor.html">Kỳ thi</a>
          <a href="./stats.html">Thống kê</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="grid-3">
        <div class="card kpi">
          <div class="label">Tổng kỳ thi</div>
          <div class="num" id="kpiExams">0</div>
        </div>
        <div class="card kpi">
          <div class="label">Tổng sinh viên</div>
          <div class="num" id="kpiStudents">0</div>
        </div>
        <div class="card kpi">
          <div class="label">Điểm TB (tất cả lượt)</div>
          <div class="num" id="kpiAvg">0</div>
        </div>
      </div>

      <div class="grid" style="margin-top: 12px">
        <section class="card">
          <div class="row">
            <h2 class="h2">Quản lý kỳ thi</h2>
            <div class="spacer"></div>
            <a class="btn btn-primary" href="./exam-editor.html"
              >+ Tạo kỳ thi</a
            >
          </div>
          <div class="table-wrap" style="margin-top: 10px">
            <table>
              <thead>
                <tr>
                  <th>Mã</th>
                  <th>Tên</th>
                  <th>Loại</th>
                  <th>Ngày</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="examRows"></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <div class="row">
            <h2 class="h2">Quản lý người dùng (SV)</h2>
            <div class="spacer"></div>
            <button class="btn btn-primary" id="btnNewUser">+ Thêm SV</button>
          </div>

          <div class="sep"></div>

          <div class="form-2">
            <div>
              <label class="small">Họ tên</label>
              <input id="uName" placeholder="Nguyễn Văn A" />
            </div>
            <div>
              <label class="small">Email</label>
              <input id="uEmail" placeholder="a@ptit.edu.vn" />
            </div>
          </div>
          <div class="row" style="margin-top: 10px">
            <button class="btn btn-ghost" id="btnClearUser">Xóa form</button>
            <div class="spacer"></div>
            <button class="btn btn-primary" id="btnSaveUser">Lưu SV</button>
          </div>
          <div
            class="muted small"
            id="userFormHint"
            style="margin-top: 6px"
          ></div>

          <div class="table-wrap" style="margin-top: 10px">
            <table>
              <thead>
                <tr>
                  <th>Mã</th>
                  <th>Họ tên</th>
                  <th>Email</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="userRows"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="./assets/db.js"></script>
    <script src="./assets/seed.js"></script>
    <script src="./assets/utils.js"></script>
    <script src="./assets/pages/dashboard.js"></script>
  </body>
</html>
