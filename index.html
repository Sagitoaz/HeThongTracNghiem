<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách kỳ thi — Hệ Thống Trắc Nghiệm PTIT</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/exam.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar__brand" href="index.html">🎓 PTIT Trắc Nghiệm</a>
    <div class="navbar__nav">
      <div class="navbar__user">
        <span id="navUsername"></span>
        <button class="btn btn--ghost btn--sm" id="btnLogout">Đăng xuất</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="page-main container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Danh sách kỳ thi</h1>
        <p class="page-subtitle">Chọn bài thi và bắt đầu làm bài</p>
      </div>
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input
          id="searchInput"
          class="form-input"
          type="search"
          placeholder="Tìm kiếm bài thi..."
          aria-label="Tìm kiếm"
        />
      </div>
    </div>

    <!-- Exam list -->
    <div id="examGrid" class="exam-grid">
      <!-- Populated by JS -->
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-state__icon">📋</div>
      <div class="empty-state__title">Không tìm thấy bài thi</div>
      <div class="empty-state__desc">Thử thay đổi từ khóa tìm kiếm hoặc quay lại sau.</div>
    </div>
  </main>

  <script src="data/mock-data.js"></script>
  <script src="js/data-service.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/exam-service.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
