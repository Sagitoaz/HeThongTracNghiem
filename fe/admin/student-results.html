<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kết quả sinh viên — Admin PTIT</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">⚙️ Admin Panel</span>
      <span class="sidebar__sub">PTIT Trắc Nghiệm</span>
    </div>
    <nav class="sidebar__nav">
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">📊</span> Dashboard</a>
      <a href="exam-editor.html" class="sidebar__link"><span class="sidebar__icon">📝</span> Quản lý đề thi</a>
      <a href="statistics.html" class="sidebar__link"><span class="sidebar__icon">📈</span> Thống kê</a>
      <a href="student-results.html" class="sidebar__link sidebar__link--active"><span class="sidebar__icon">👥</span> Kết quả sinh viên</a>
    </nav>
    <div class="sidebar__footer">© 2026 PTIT</div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <span class="admin-topbar__title">Kết quả sinh viên</span>
      </div>
      <div class="admin-topbar__user">
        <span id="adminUsername"></span>
        <button class="btn btn--ghost btn--sm" id="btnLogout">Đăng xuất</button>
      </div>
    </header>

    <main class="admin-content">
      <!-- Filters -->
      <div class="card mb-xl">
        <div class="card__header"><h2 class="card__title">Lọc kết quả</h2></div>
        <div class="flex gap-md" style="padding:0 var(--space-lg) var(--space-lg);flex-wrap:wrap;align-items:flex-end">
          <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px">
            <label class="form-label">Tên đăng nhập</label>
            <input id="filterUsername" class="form-input" type="text" placeholder="Lọc theo tên..." />
          </div>
          <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px">
            <label class="form-label">Đề thi</label>
            <select id="filterExam" class="form-select"><option value="">Tất cả</option></select>
          </div>
          <button class="btn btn--ghost btn--sm" id="btnClearFilter">Xóa lọc</button>
        </div>
      </div>

      <!-- Results table -->
      <div class="card">
        <div class="card__header">
          <h2 class="card__title">Danh sách kết quả (<span id="resultCount">0</span>)</h2>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Sinh viên</th>
                <th>Đề thi</th>
                <th>Điểm</th>
                <th>Câu đúng</th>
                <th>Thời gian</th>
                <th>Nộp lúc</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="resultsTbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/student-results.js"></script>
</body>
</html>
