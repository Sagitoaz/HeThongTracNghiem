<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập Quản trị — Hệ Thống Trắc Nghiệm PTIT</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page">

  <!-- Hero banner -->
  <header class="auth-hero">
    <div class="auth-hero__logo">🔐</div>
    <div class="auth-hero__school">Học viện Công nghệ Bưu chính Viễn thông — PTIT</div>
    <h1 class="auth-hero__title">Cổng Quản trị Hệ Thống</h1>
  </header>

  <!-- Main content -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="admin-badge">⚙️ Quản trị viên</div>
      <h2 class="auth-card__heading">Đăng nhập Admin</h2>
      <p class="auth-card__sub">Chỉ dành cho tài khoản quản trị được cấp phép.</p>

      <!-- Error banner -->
      <div id="errorBanner" class="auth-error-banner hidden" role="alert" aria-live="assertive"></div>

      <!-- Login form -->
      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <input
            id="username"
            class="form-input"
            type="text"
            name="username"
            placeholder="Tài khoản quản trị"
            autocomplete="username"
            autofocus
          />
          <p class="field-error" id="usernameError"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-wrap">
            <input
              id="password"
              class="form-input"
              type="password"
              name="password"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
            />
            <button type="button" class="btn-toggle-pw" id="togglePw" aria-label="Hiện/ẩn mật khẩu">👁</button>
          </div>
          <p class="field-error" id="passwordError"></p>
        </div>

        <div class="form-group mt-md">
          <button type="submit" class="btn btn--primary btn--full">Đăng nhập</button>
        </div>
      </form>

      <div class="auth-link-row">
        <a href="../login.html">← Trở về trang sinh viên</a>
      </div>
    </div>
  </main>

  <footer class="auth-footer">
    © 2026 Học viện Công nghệ Bưu chính Viễn thông (PTIT). All rights reserved.
  </footer>

  <!-- Scripts — note: relative paths from admin/ directory -->
  <script src="../js/api-client.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // ─── Init ─────────────────────────────────────────────────

    // Redirect if already logged in as admin
    if (AuthService.isAdminLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    // ─── Password toggle ───────────────────────────────────────
    document.getElementById('togglePw').addEventListener('click', function () {
      var pw = document.getElementById('password');
      if (pw.type === 'password') {
        pw.type = 'text';
        this.textContent = '🙈';
      } else {
        pw.type = 'password';
        this.textContent = '👁';
      }
    });

    // ─── Helpers ──────────────────────────────────────────────
    function showError(msg) {
      var banner = document.getElementById('errorBanner');
      banner.textContent = msg;
      banner.classList.remove('hidden');
    }
    function clearError() {
      document.getElementById('errorBanner').classList.add('hidden');
    }
    function setFieldError(fieldId, msg) {
      var el = document.getElementById(fieldId + 'Error');
      var input = document.getElementById(fieldId);
      if (msg) {
        el.textContent = msg;
        input.classList.add('form-input--error');
      } else {
        el.textContent = '';
        input.classList.remove('form-input--error');
      }
    }

    // ─── Form submission ──────────────────────────────────────
    document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value.trim();
      var valid = true;

      if (!username) {
        setFieldError('username', 'Vui lòng nhập tên đăng nhập.');
        valid = false;
      } else {
        setFieldError('username', '');
      }

      if (!password) {
        setFieldError('password', 'Vui lòng nhập mật khẩu.');
        valid = false;
      } else {
        setFieldError('password', '');
      }

      if (!valid) return;

      var result = await AuthService.loginAdmin(username, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        showError(result.message);
      }
    });
  </script>
</body>
</html>
