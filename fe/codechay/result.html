<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả bài thi - PTIT Trắc Nghiệm</title>
    <link rel="stylesheet" href="./css/result.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="logo">🎓</span>
            <span class="brand-txt">Trắc nghiệm PTIT</span>
        </div>
        <div class="user">
            <span class="username" id="headerUser"></span>
            <a href="./login.html" class="logout-btn" style="text-decoration:none;display:inline-block">Đăng xuất</a>
        </div>
    </header>

    <main class="container">
        <div style="max-width:1200px;margin:0 auto 20px;display:flex;gap:12px;justify-content:center">
            <a href="./index.html" style="text-decoration:none;padding:12px 28px;background:#fff;color:#b91c1c;border:2px solid #b91c1c;border-radius:10px;font-weight:700;font-size:15px">← Về trang chủ</a>
            <a href="./index.html" style="text-decoration:none;padding:12px 28px;background:#b91c1c;color:#fff;border:2px solid #b91c1c;border-radius:10px;font-weight:700;font-size:15px">🔄 Thi bài khác</a>
        </div>

        <section class="result-card">
            <p class="subtitle">Kết quả bài thi của bạn:</p>
            <h1 class="score" id="rs-score">--</h1>
            <p class="meta" id="rs-meta">Đúng: --/--</p>
        </section>

        <div class="infor-grid">
            <section class="infor-card">
                <p class="infor-title">BÀI THI</p>
                <p class="infor-value" id="rs-exam">--</p>
            </section>
            <section class="infor-card">
                <p class="infor-title">THỜI GIAN LÀM BÀI</p>
                <p class="infor-value" id="rs-duration">--</p>
            </section>
            <section class="infor-card">
                <p class="infor-title">NỘP LÚC</p>
                <p class="infor-value" id="rs-submitted">--</p>
            </section>
        </div>

        <section class="chart-card">
            <h2 class="chart-title">Biểu đồ kết quả</h2>
            <div class="divider"></div>
            <div class="chart-wrap">
                <div class="chart"></div>
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-color green"></span>
                        <span>Đúng</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color red"></span>
                        <span>Sai</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="review-card">
            <h2 class="review-title">Xem lại đáp án</h2>
            <div class="divider"></div>
            <div id="questions-list"></div>
        </section>
    </main>

    <script src="./js/api-client.js"></script>
    <script src="./js/result.js"></script>
    <script>
        const _u = JSON.parse(localStorage.getItem('ptit_user') || '{}');
        if (_u.username) document.getElementById('headerUser').textContent = _u.username;
    </script>
</body>
</html>
