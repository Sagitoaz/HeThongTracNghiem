<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị - PTIT</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <header class="app-header">
        <h1>Học viện Công nghệ Bưu chính Viễn thông</h1>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Đăng nhập</h2>
                <p>với tư cách cán bộ/giảng viên</p>
            </div>
            <form class="auth-form" id="admin-login-form">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập username quản trị" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-submit">Đăng Nhập</button>
            </form>
            <div class="auth-links">
                <p>Là sinh viên? <a href="../login.html">Đăng nhập ngay</a></p>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Học viện Công nghệ Bưu chính Viễn thông. Dành cho mục đích học tập.</p>
    </footer>

    <script src="../js/auth.js"></script>
</body>
</html>
