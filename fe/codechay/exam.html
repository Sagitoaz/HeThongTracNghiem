<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài thi - PTIT Trắc Nghiệm</title>
    <link rel="stylesheet" href="./css/exam.css">
</head>
<body>
    <header class="ptit-header">
        <div class="ptit-brand-group">
            <span class="ptit-logo">🎓</span>
            <div>
                <div class="ptit-org">Học viện Công nghệ Bưu chính Viễn thông</div>
                <div class="ptit-sys">Hệ thống Trắc Nghiệm Trực Tuyến</div>
            </div>
        </div>
        <div class="ptit-user-group">
            <span id="headerUser" class="ptit-username"></span>
            <a href="./login.html" class="ptit-logout">Đăng xuất</a>
        </div>
    </header>

    <div class="container">
        <div class="left-panel">
            <div id="header">
                <h1 id="exam-title">Luyện tập Mạng Máy Tính</h1>
                <p id="exam-info">10 câu hỏi • 30 phút</p>
            </div>

            <div class="exam-card" id="question-card">
                <p id="question-number">CÂU 1/10</p>
                <p id="question-text">Mô hình OSI có bao nhiêu tầng?</p>
                <div id="answer">
                    <button class="answer-btn"></button>
                    <button class="answer-btn"></button>
                    <button class="answer-btn"></button>
                    <button class="answer-btn"></button>
                </div>
            </div>

            <div id="action-bar">
                <button class="answer-btn" id="prev">&larr; Câu trước</button>
                <p id="answered-count"></p>
                <button class="answer-btn" id="next">Câu tiếp &rarr;</button>
                <button class="answer-btn" id="submit">Nộp bài</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="exam-card" id="timer-card">
                <h2 id="time"></h2>
            </div>
        </div>
    </div>

    <script src="../data/mock-data.js"></script>
    <script src="./js/exam.js"></script>
    <script>
        const _u = JSON.parse(localStorage.getItem('ptit_user') || '{}');
        if (_u.username) document.getElementById('headerUser').textContent = _u.username;
    </script>
</body>
</html>
