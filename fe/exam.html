<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Làm bài thi — Hệ Thống Trắc Nghiệm PTIT</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/exam.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <span class="navbar__brand">🎓 PTIT Trắc Nghiệm</span>
    <div class="navbar__user">
      <span id="navUsername"></span>
    </div>
  </nav>

  <!-- Main -->
  <main class="page-main container">
    <div id="examContainer" class="exam-layout">

      <!-- Left: question area -->
      <div id="questionArea">
        <div id="examHeader" class="page-header">
          <div>
            <h1 id="examTitle" class="page-title"></h1>
            <p id="examSubtitle" class="page-subtitle"></p>
          </div>
        </div>

        <!-- Question card -->
        <div id="questionCard" class="question-card">
          <div id="questionNumber" class="question-card__number"></div>
          <div id="questionText" class="question-card__text"></div>
          <div id="optionsList" class="options-list"></div>
        </div>

        <!-- Navigation controls -->
        <div class="q-controls">
          <button id="btnPrev" class="btn btn--ghost">← Câu trước</button>
          <span id="progressLabel" class="text-sec text-sm"></span>
          <div style="display:flex;gap:8px">
            <button id="btnNext" class="btn btn--secondary">Câu tiếp →</button>
            <button id="btnSubmit" class="btn btn--primary">Nộp bài</button>
          </div>
        </div>
      </div>

      <!-- Right: timer + navigator -->
      <div>
        <div class="exam-timer">
          <div class="exam-timer__label">Thời gian còn lại</div>
          <div id="timerDisplay" class="exam-timer__value">00:00</div>
          <div class="q-nav" id="qNav">
            <div class="q-nav__title">Câu hỏi</div>
            <div id="qNavGrid" class="q-nav__grid"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Confirm submit modal -->
    <div id="submitModal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal__header">
          <div class="modal__title">Xác nhận nộp bài</div>
          <button class="modal__close" id="closeModal">×</button>
        </div>
        <div class="modal__body">
          <p id="submitModalBody"></p>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" id="cancelSubmit">Tiếp tục làm</button>
          <button class="btn btn--primary" id="confirmSubmit">Nộp bài</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/exam-service.js"></script>
  <script src="js/exam.js"></script>
</body>
</html>
