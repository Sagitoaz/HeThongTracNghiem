<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kết quả thi — Hệ Thống Trắc Nghiệm PTIT</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/exam.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar__brand" href="index.html">🎓 PTIT Trắc Nghiệm</a>
    <div class="navbar__nav">
      <div class="navbar__user">
        <span id="navUsername"></span>
        <button class="btn btn--ghost btn--sm" id="btnLogout">Đăng xuất</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="page-main container">

    <!-- Score hero -->
    <div class="result-hero">
      <div class="result-hero__label">Kết quả bài thi</div>
      <div class="result-hero__score" id="scoreDisplay">—</div>
      <div class="result-hero__fraction" id="scoreFraction"></div>
    </div>

    <!-- Stat cards -->
    <div class="result-stats-grid" id="resultStats"></div>

    <!-- Chart -->
    <div class="card mb-xl">
      <div class="card__header">
        <h2 class="card__title">Biểu đồ kết quả</h2>
      </div>
      <div class="chart-container">
        <canvas id="resultChart"></canvas>
      </div>
    </div>

    <!-- Review questions -->
    <div class="card mb-xl">
      <div class="card__header">
        <h2 class="card__title">Xem lại đáp án</h2>
      </div>
      <div id="reviewArea" class="review-area"></div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-md mt-xl mb-xl">
      <a href="index.html" class="btn btn--secondary">← Về danh sách đề thi</a>
    </div>

  </main>

  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/exam-service.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
