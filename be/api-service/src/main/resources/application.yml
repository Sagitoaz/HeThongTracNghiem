server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:54322/postgres}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:http://localhost:54321/auth/v1}

app:
  supabase:
    url: ${SUPABASE_URL:http://localhost:54321}
    anon-key: ${SUPABASE_ANON_KEY:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
