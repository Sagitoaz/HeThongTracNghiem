server:
  port: ${PORT:8081}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: codechay-service
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SUPABASE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/postgres?sslmode=require}}
    username: ${SUPABASE_DB_USER:${DB_USER:postgres}}
    password: ${SUPABASE_DB_PASSWORD:${DB_PASSWORD:postgres}}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:${JWT_ISSUER:https://example.supabase.co/auth/v1}}

app:
  supabase:
    url: ${SUPABASE_URL:}
    anon-key: ${SUPABASE_ANON_KEY:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info